name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      version:
        description: "Version label for dmg name (e.g. 0.1.0)"
        required: false
        default: "0.1.0"

permissions:
  contents: write

jobs:
  release:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: reader/package-lock.json

      - name: Resolve version
        id: ver
        run: |
          if [[ "${GITHUB_REF_TYPE}" == "tag" ]]; then
            V="${GITHUB_REF_NAME#v}"
          else
            V="${{ github.event.inputs.version || '0.1.0' }}"
          fi
          echo "version=$V" >> "$GITHUB_OUTPUT"

      - name: Build reader, app, dmg
        env:
          VERSION: ${{ steps.ver.outputs.version }}
        run: |
          chmod +x scripts/*.sh
          ./scripts/build-reader.sh
          ./scripts/sync-reader-to-app.sh
          ./scripts/ci-xcodebuild.sh
          ./scripts/package-dmg.sh

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: mdeasy-release
          path: |
            build/mdeasy.app
            build/mdeasy-*.dmg

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            build/mdeasy-*.dmg
          body: |
            ## mdeasy ${{ steps.ver.outputs.version }}

            Unsigned self-use build (no Apple Developer signing).

            ### First open on macOS (method B)
            1. Open `mdeasy` (if blocked, dismiss the alert)
            2. **System Settings → Privacy & Security**
            3. Find the message that **mdeasy** was blocked
            4. Click **Open Anyway**, confirm **Open**

            Same Mac usually opens normally afterwards.

            Offline Markdown reader — no account, no network, focus on reading.
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
